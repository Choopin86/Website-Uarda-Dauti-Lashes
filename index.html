<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Uarda Dauti Lashes - Home</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Jost:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <!-- 1.HEADER SECTION -->
    <header class="header">
      <!-- placeholder for header content -->
    </header>

    <!-- 2.Hero Section -->
    <header class="hero flourish">
      <!-- placeholder content (brand name, slogan, hero text) -->
    </header>

    <!-- 3.Trust Strip Section -->
    <section class="trust-strip">
      <!-- placeholder for trust highlight items -->
    </section>

    <!-- 4.Featured Service Section -->
    <section class="featured-service">
      <!-- placeholder for featured service (courses) -->
    </section>

    <!-- 5.Services Preview Section -->
    <section class="services-preview">
      <!-- placeholder for service cards (div.cards) (ahref - Browse All)-->
    </section>

    <!-- 6.Achievements Preview -->
    <section class="achievements-preview">
      <div class="achievements-preview-slider">
        <div class="slides"></div>
        <div class="controls"></div>
      </div>
    </section>

    <!-- 7.About Preview Section -->
    <section class="about-preview">
      <!-- placeholder for about/philosophy content -->
    </section>

    <!-- 8.Main CTA Section -->
    <section class="main-cta">
      <!-- placeholder links/icons (div.cta-actions) -->
    </section>

    <!-- 9.Footer Section -->
    <footer class="footer">
      <!-- placeholder content -->
    </footer>
    <script type="module" src="/src/main.js" defer></script>
  </body>
</html>
